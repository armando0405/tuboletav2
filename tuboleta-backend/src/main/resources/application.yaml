server:
  port: 8088

spring:
  application:
    name: tuboleta-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/tuboleta_db
    username: tuboleta_user
    password: tuboleta_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger